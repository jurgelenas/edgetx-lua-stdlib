name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check:
    name: Lint and Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: cargo-stylua-${{ runner.os }}

      - name: Install tools
        run: make install-tools

      - name: Run checks
        run: make check
